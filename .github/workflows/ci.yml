name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build
        working-directory: go
        run: go build ./...
      - name: Vet
        working-directory: go
        run: go vet ./...
      - name: Test
        working-directory: go
        run: go test ./...

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        working-directory: rust
        run: cargo build --locked
      - name: Test
        working-directory: rust
        run: cargo test --locked
